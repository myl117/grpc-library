syntax = "proto3";

package library;

import "google/protobuf/empty.proto";

option java_package = "com.myl117.java.library.grpc.service";
option java_outer_classname = "LibraryProto";

service LibraryService {
  // Get information about a book by ID
  rpc GetBook (BookRequest) returns (BookResponse);

  // List all books
  rpc ListBooks (google.protobuf.Empty) returns (BookList);

  // Create a new book
  rpc CreateBook (CreateBookRequest) returns (BookResponse);

  // Update an existing book
  rpc UpdateBook (UpdateBookRequest) returns (BookResponse);

  // Delete a book by ID
  rpc DeleteBook (BookRequest) returns (DeleteBookResponse);
}

message BookRequest {
  int32 id = 1;
}

message BookResponse {
  int32 id = 1;
  string title = 2;
  string author = 3;
  bool available = 4;
  string isbn = 5;
  string description = 6;
  string cover_url = 7;
  int32 published_year = 8;
}

message CreateBookRequest {
  string title = 1;
  string author = 2;
  bool available = 3;
  string isbn = 4;
  string description = 5;
  string cover_url = 6;
  int32 published_year = 7;
}

message UpdateBookRequest {
  int32 id = 1;
  string title = 2;
  string author = 3;
  bool available = 4;
  string isbn = 5;
  string description = 6;
  string cover_url = 7;
  int32 published_year = 8;
}

message DeleteBookResponse {
  bool success = 1;
  string message = 2;
}

message BookList {
  repeated BookResponse books = 1;
}
