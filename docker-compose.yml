version: "3.9"

services:
  # ── Java gRPC backend ──────────────────────────────────────────────────────
  grpc-server:
    build:
      context: ./java-grpc-library-service
      dockerfile: Dockerfile
    container_name: grpc-server
    ports:
      - "9090:9090"
    networks:
      - grpc-net
    healthcheck:
      # Use bash /dev/tcp redirection since nc is not installed in the JRE image
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/9090"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Envoy proxy (grpc-web → gRPC) ─────────────────────────────────────────
  envoy:
    image: envoyproxy/envoy:v1.27.0
    container_name: envoy
    ports:
      - "8282:8282"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      grpc-server:
        condition: service_healthy
    networks:
      - grpc-net
    # Override the upstream address used in envoy.yaml for docker-compose:
    # the Java service is reachable by its service name, not host.docker.internal.
    environment:
      - ENVOY_UID=0

  # ── Browser client (webpack dev server) ───────────────────────────────────
  browser-client:
    image: node:20-alpine
    container_name: browser-client
    working_dir: /app
    volumes:
      - ./browser-client:/app
    ports:
      - "8081:8081"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - envoy
    networks:
      - grpc-net

networks:
  grpc-net:
    driver: bridge
